# Reverse-proxy config for the optional `nginx` service in
# docker-compose.yml. Sprint 5 prompt 5.1.g.
#
# Plain HTTP only (Sprint 6 will add TLS termination + cert
# management). Sprint 5.1.f's structlog request_id ContextVar (PR #55)
# correlates per-request log lines via the X-Request-Id header — this
# proxy preserves the upstream gateway's correlation ID by forwarding
# the header verbatim, or letting the API generate one when absent.

# Drop privileges to the unprivileged nginx-distribution user. Mirrors
# the API container's "non-root by default" posture.
user nginx;

# 1 worker per CPU. The compose dev box has plenty; auto picks the right
# value at start time without baking a number into the config.
worker_processes auto;

events {
    # Per-worker connection cap. Loopback dev rarely sees > 100 conns;
    # 1024 is the nginx default and sufficient for the prod-like stack.
    worker_connections 1024;
}

http {
    # MIME types + JSON-friendly default (the API only emits JSON).
    default_type application/json;

    # Logging format. Includes the request_id so the proxy log
    # interleaves cleanly with the API's structlog stream.
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"x_request_id":"$http_x_request_id"'
    '}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    keepalive_timeout 65;

    # Cap inbound request bodies. The fraud-API request payload is
    # ~5 KB at most (TransactionRequest with full V/C/D/M/identity
    # dicts populated); 1 MB is generous and protects against
    # accidental large uploads.
    client_max_body_size 1m;

    upstream fraud_api {
        # Compose service DNS — `fraud-api` resolves to the FastAPI
        # container's IP within the compose network.
        server fraud-api:8000;
        # Reuse upstream connections to amortise TLS / TCP setup cost
        # (zero in this plain-HTTP path; future TLS termination keeps
        # the keepalive pool warm).
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://fraud_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Standard forwarded-for headers so the API sees the real
            # client IP rather than nginx's.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass through (or generate) the X-Request-Id header.
            # `$http_x_request_id` is the inbound header value (empty
            # if absent). The API's middleware (5.1.f main.py) parses
            # it as UUID; if invalid OR empty, the API generates a
            # fresh UUID4 and echoes it back. So this line works both
            # when an upstream gateway sets the header and when nothing
            # does.
            proxy_set_header X-Request-Id      $http_x_request_id;

            # Match the API's <100ms P95 budget (CLAUDE.md §3) plus
            # generous slack for the request/response transit.
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }
    }
}
