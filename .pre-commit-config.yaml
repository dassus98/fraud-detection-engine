# Pre-commit hooks. Install via `make install`.
# Universal Standards (docs/CONVENTIONS.md) require ruff, mypy, pytest-fast,
# and detect-secrets to run before every commit.

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # uv.lock and .env.example are intentional false-positive sources.
        # sprints/ reports always contain hex run-ids, SHA-256 checksums,
        # and structured-log excerpts — never real secrets.
        exclude: '^(uv\.lock|\.env\.example)$|^sprints/'

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, src only)
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest-fast
        name: pytest (unit, fast)
        # `-v` (per-test name printing) keeps stdout active throughout
        # the ~60 s run so the WSL service does not invoke its 60-second
        # no-output kill (CLAUDE.md §17, `Wsl/Service/E_UNEXPECTED`).
        # `-q` would only emit progress dots, which the WSL service
        # has historically misread as a stalled process. The verbose
        # form prints ~7 lines/s, far below any silence threshold.
        entry: uv run pytest tests/unit -v --no-cov --tb=short
        language: system
        types: [python]
        pass_filenames: false
